<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOM26 Token Collection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
    }
    
    .boxes-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }
    
    .boxes-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    .boxes-header h2 {
      color: #1565C0;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    
    .boxes-header p {
      color: #757575;
      font-size: 1.1rem;
    }
    
    .boxes-header strong {
      color: #1976D2;
    }
    
    .sky-area {
      background: linear-gradient(to bottom, #87CEEB 0%, #E3F2FD 100%);
      border-radius: 12px;
      height: 200px;
      position: relative;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    
    #tokenCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .boxes-row {
      display: flex;
      justify-content: space-around;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .box-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 150px;
    }
    
    .token-box {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #1976D2, #1565C0);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
      border: 3px solid #42A5F5;
      position: relative;
      overflow: hidden;
    }
    
    .token-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    }
    
    .box-number {
      font-size: 3rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    .box-counter {
      background: #FAFAFA;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-align: center;
      border: 2px solid #E0E0E0;
      width: 100%;
      margin-top: 0.5rem;
    }
    
    .counter-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #1565C0;
    }
    
    .counter-label {
      font-size: 0.75rem;
      color: #757575;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .total-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid #E0E0E0;
    }
    
    .total-stat {
      text-align: center;
    }
    
    .total-stat .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #1565C0;
    }
    
    .total-stat .stat-label {
      font-size: 0.9rem;
      color: #757575;
    }
    
    @media (max-width: 600px) {
      .boxes-container {
        padding: 1rem;
      }
      
      .boxes-row {
        flex-wrap: wrap;
      }
      
      .box-wrapper {
        max-width: calc(33.33% - 0.5rem);
      }
      
      .token-box {
        min-height: 80px;
      }
      
      .box-number {
        font-size: 2rem;
      }
      
      .total-row {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="boxes-container">
    <div class="boxes-header">
      <h2>Token Collection</h2>
      <p>Total tokens collected: <strong id="total-tokens">0</strong></p>
    </div>
    
    <div class="sky-area">
      <canvas id="tokenCanvas"></canvas>
    </div>
    
    <div class="boxes-row">
      <div class="box-wrapper">
        <div class="token-box" data-box="1">
          <span class="box-number">1</span>
        </div>
        <div class="box-counter">
          <div class="counter-value" id="box1-count">0</div>
          <div class="counter-label">Box 1</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="2">
          <span class="box-number">2</span>
        </div>
        <div class="box-counter">
          <div class="counter-value" id="box2-count">0</div>
          <div class="counter-label">Box 2</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="3">
          <span class="box-number">3</span>
        </div>
        <div class="box-counter">
          <div class="counter-value" id="box3-count">0</div>
          <div class="counter-label">Box 3</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="4">
          <span class="box-number">4</span>
        </div>
        <div class="box-counter">
          <div class="counter-value" id="box4-count">0</div>
          <div class="counter-label">Box 4</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="5">
          <span class="box-number">5</span>
        </div>
        <div class="box-counter">
          <div class="counter-value" id="box5-count">0</div>
          <div class="counter-label">Box 5</div>
        </div>
      </div>
    </div>
    
    <div class="total-row">
      <div class="total-stat">
        <div class="stat-value" id="total-submissions">0</div>
        <div class="stat-label">Total Submissions</div>
      </div>
    </div>
  </div>

  <script src="token-boxes-standalone.js"></script>
  <script src="patch-widget-app.js"></script>
  <script type="module" src="./widget-config.js"></script>
  <script type="module">
    import { startBoxTotaliserListener, fetchSubmissionCount } from './patch-widget-listener.js';

    function updateSubmissionCount() {
      fetchSubmissionCount().then(count => {
        const el = document.getElementById('total-submissions');
        if (el) el.innerText = count;
        // Keep boxState in sync so updateDisplay() doesn't overwrite with stale value
        if (window.JOM26TokenBoxes) window.JOM26TokenBoxes.setSubmissionsCount(count);
      });
    }

    function updateBoxesUI({ boxCounts, total, isUpdate, delta }) {
      // Route all Firestore updates through syncFromFirestore so that boxState
      // in patch-widget-app.js stays in agreement with the database.  If a
      // later postMessage triggers updateDisplay(), it will read correct data.
      if (window.JOM26TokenBoxes && typeof window.JOM26TokenBoxes.syncFromFirestore === 'function') {
        window.JOM26TokenBoxes.syncFromFirestore(boxCounts, total);
      } else {
        // Fallback: direct DOM update before patch-widget-app.js is ready
        for (let i = 1; i <= 5; i++) {
          const el = document.getElementById(`box${i}-count`);
          if (el) el.innerText = boxCounts[i] || 0;
        }
        const totalEl = document.getElementById('total-tokens');
        if (totalEl) totalEl.innerText = total;
      }

      // Trigger token-fall animation from Firestore delta.
      // triggerAnimationFromFirestore() will skip boxes already handled by
      // the postMessage path (when form + patch are in the same index.html).
      if (isUpdate && delta && window.tokenBoxes && typeof window.tokenBoxes.triggerAnimationFromFirestore === 'function') {
        for (const [boxNum, amount] of Object.entries(delta)) {
          window.tokenBoxes.triggerAnimationFromFirestore(parseInt(boxNum), amount);
        }
      }

      updateSubmissionCount();
    }

    startBoxTotaliserListener(updateBoxesUI);
    updateSubmissionCount();
  </script>
</body>
</html>
