<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOM26 Token Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
    }

    /* ── Banner shell ───────────────────────────────────────────────── */
    /* The sky gradient IS the container — canvas sits behind everything */
    .boxes-container {
      position: relative;
      overflow: hidden;
      width: 100%;
      background: linear-gradient(180deg, #4DA8DA 0%, #87CEEB 30%, #B0DEFF 65%, #D6EEFF 100%);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(21, 101, 192, 0.28);
      padding: 0 1.25rem 0.8rem;
    }

    /* Canvas fills the full banner behind all DOM elements */
    #tokenCanvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      /* display dimensions driven by JS resize() */
    }

    /* ── Token boxes row — floats over the sky canvas ───────────────── */
    .boxes-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      gap: 0.75rem;
      /* margin-top creates the sky "breathing room" above the boxes */
      margin-top: 90px;
      margin-bottom: 0.65rem;
    }

    .box-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 130px;
    }

    /* Box — square, open at the bottom edge to merge visually with counter */
    .token-box {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(145deg, #1E88E5 0%, #1565C0 100%);
      border-radius: 10px 10px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 16px rgba(21, 101, 192, 0.50);
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-bottom: none;
      position: relative;
      overflow: hidden;
    }

    .token-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.22) 0%, transparent 55%);
      pointer-events: none;
    }

    .box-number {
      font-size: 2.4rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.28);
      position: relative;
      z-index: 1;
    }

    /* Counter panel — frosted glass, attached flush to box bottom */
    .box-counter {
      width: 100%;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 0.3rem 0.4rem 0.38rem;
      text-align: center;
    }

    .counter-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1565C0;
      line-height: 1.1;
    }

    .counter-label {
      font-size: 0.6rem;
      color: #546E7A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }

    /* ── Total-tokens footer strip ───────────────────────────────────── */
    .total-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      padding-top: 0.3rem;
    }

    .total-stat { text-align: center; }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #0D47A1;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.65);
    }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: #1565C0;
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .boxes-row   { gap: 0.4rem; margin-top: 60px; }
      .box-number  { font-size: 1.7rem; }
      .counter-value { font-size: 0.95rem; }
      .stat-value  { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="boxes-container">

    <!-- Sky canvas — position:absolute, rendered behind all DOM content -->
    <canvas id="tokenCanvas"></canvas>

    <!-- The five token collection boxes -->
    <div class="boxes-row">
      <div class="box-wrapper">
        <div class="token-box" data-box="1"><span class="box-number">1</span></div>
        <div class="box-counter">
          <div class="counter-value" id="box1-count">0</div>
          <div class="counter-label">Box 1</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="2"><span class="box-number">2</span></div>
        <div class="box-counter">
          <div class="counter-value" id="box2-count">0</div>
          <div class="counter-label">Box 2</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="3"><span class="box-number">3</span></div>
        <div class="box-counter">
          <div class="counter-value" id="box3-count">0</div>
          <div class="counter-label">Box 3</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="4"><span class="box-number">4</span></div>
        <div class="box-counter">
          <div class="counter-value" id="box4-count">0</div>
          <div class="counter-label">Box 4</div>
        </div>
      </div>
      <div class="box-wrapper">
        <div class="token-box" data-box="5"><span class="box-number">5</span></div>
        <div class="box-counter">
          <div class="counter-value" id="box5-count">0</div>
          <div class="counter-label">Box 5</div>
        </div>
      </div>
    </div>

    <!-- Total tokens footer (replaces "Total Submissions") -->
    <div class="total-row">
      <div class="total-stat">
        <div class="stat-value" id="total-tokens">0</div>
        <div class="stat-label">Total Tokens Collected</div>
      </div>
    </div>

  </div><!-- /.boxes-container -->

  <script src="token-boxes-standalone.js"></script>
  <script src="patch-widget-app.js"></script>
  <script type="module" src="./widget-config.js"></script>
  <script type="module">
    import { startBoxTotaliserListener } from './patch-widget-listener.js';

    function updateBoxesUI({ boxCounts, total, isUpdate, delta }) {
      // Sync counter display via patch-widget-app.js state machine
      if (window.JOM26TokenBoxes && typeof window.JOM26TokenBoxes.syncFromFirestore === 'function') {
        window.JOM26TokenBoxes.syncFromFirestore(boxCounts, total);
      } else {
        // Fallback: direct DOM update before patch-widget-app.js is ready
        for (let i = 1; i <= 5; i++) {
          const el = document.getElementById(`box${i}-count`);
          if (el) el.innerText = (boxCounts[i] || 0).toLocaleString();
        }
        const totalEl = document.getElementById('total-tokens');
        if (totalEl) totalEl.innerText = total.toLocaleString();
      }

      // Trigger token-fall animation from Firestore delta.
      // triggerAnimationFromFirestore() uses first-one-wins logic to avoid
      // double-animation with the postMessage path.
      if (isUpdate && delta && window.tokenBoxes &&
          typeof window.tokenBoxes.triggerAnimationFromFirestore === 'function') {
        for (const [boxNum, amount] of Object.entries(delta)) {
          window.tokenBoxes.triggerAnimationFromFirestore(parseInt(boxNum), amount);
        }
      }
    }

    startBoxTotaliserListener(updateBoxesUI);
  </script>
</body>
</html>
