<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOM26 Veg Pledge Form</title>
  <style>
    @font-face {
      font-family: 'TradeGothicBoldCondensed';
      src: url('./assets/Fonts/trade-gothic-bold-condensed-no-20/trade-gothic-bold-condensed-no-20.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Reset form elements so they inherit custom fonts instead of
       using the browser's default system font for buttons/inputs. */
    button, input, select, textarea {
      font: inherit;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      color: #212121;
    }

    .widget-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .form-section {
      padding: 1.25rem 1.5rem 1rem;
    }

    .form-step {
      display: none;
    }

    .form-step.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-step h2 {
      color: #2E7D32;
      margin-bottom: 0.75rem;
      font-size: 1.35rem;
      text-align: center;
    }

    /* ── Start screen ──────────────────────────────────────────────────── */
    .start-screen {
      text-align: center;
      padding: 0.75rem 0;
    }

    /* Matches veg-pledge-btn.html .pledge-btn exactly: 380 × 58 px pill */
    .pledge-start-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 380px;
      height: 58px;
      border-radius: 29px;
      background: #027f7e;
      color: #ffffff;
      font-family: 'TradeGothicBoldCondensed', sans-serif;
      font-size: 22px;
      font-weight: normal;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 1px 4px 4px 0px rgba(6, 57, 65, 0.5);
      transition: filter 0.15s ease, transform 0.1s ease;
      white-space: nowrap;
      -webkit-font-smoothing: antialiased;
    }

    .pledge-start-btn:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    /* ── Pathway type grid — 6 columns, one row ──────────────────────── */
    .pathway-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .pathway-card {
      background: white;
      border: 2px solid #E0E0E0;
      border-radius: 10px;
      padding: 0.5rem 0.25rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .pathway-card:hover {
      border-color: #4CAF50;
      transform: translateY(-3px);
      box-shadow: 0 3px 10px rgba(76, 175, 80, 0.2);
    }

    .pathway-card.selected {
      background: #81C784;
      border-color: #2E7D32;
      color: white;
    }

    .pathway-card .emoji {
      font-size: 1.5rem;
      margin-bottom: 0.15rem;
      line-height: 1;
    }

    .pathway-card .label {
      font-weight: 500;
      font-size: 0.7rem;
      line-height: 1.2;
      word-break: break-word;
    }

    /* ── Form rows — two fields side by side ─────────────────────────── */
    .form-row {
      display: flex;
      gap: 0.6rem;
    }

    .form-row .form-group {
      flex: 1;
      min-width: 0;
    }

    /* ── Individual form fields ──────────────────────────────────────── */
    .form-group {
      margin-bottom: 0.8rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.3rem;
      color: #212121;
      font-weight: 500;
      font-size: 0.88rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 72px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4CAF50;
    }

    .form-group small {
      display: block;
      margin-top: 0.2rem;
      color: #757575;
      font-size: 0.78rem;
    }

    .form-group.checkbox {
      display: flex;
      align-items: center;
    }

    .form-group.checkbox label {
      display: flex;
      align-items: center;
      cursor: pointer;
      margin-bottom: 0;
    }

    .form-group.checkbox input {
      width: auto;
      margin-right: 0.5rem;
      cursor: pointer;
    }

    /* ── Generic buttons ─────────────────────────────────────────────── */
    .btn {
      padding: 0.65rem 1.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background: #027f7e;
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: #015f5e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(2, 127, 126, 0.35);
    }

    .btn-back {
      background: white;
      color: #212121;
      border: 2px solid #E0E0E0;
      margin-right: 1rem;
    }

    .btn-back:hover {
      border-color: #4CAF50;
      color: #4CAF50;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .form-actions .btn-primary {
      flex: 1;
    }

    /* ── End card (step 4) ───────────────────────────────────────────── */
    .end-card {
      text-align: center;
      padding: 1.75rem 1rem 1.25rem;
    }

    .end-card h2 {
      color: #2E7D32;
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .end-card-subtitle {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .share-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #9E9E9E;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }

    .share-buttons {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      color: white;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .share-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .share-facebook  { background: #1877F2; }
    .share-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
    .share-linkedin  { background: #0A66C2; }
    .share-bluesky   { background: #0085ff; }
    .share-twitter   { background: #000; }

    .share-toast {
      display: none;
      background: #333;
      color: white;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      margin: 0.5rem auto 0;
      max-width: 360px;
      text-align: center;
    }

    .share-btn svg { flex-shrink: 0; }

    .end-card-divider {
      border: none;
      border-top: 1px solid #E0E0E0;
      margin: 1.1rem 0;
    }

    .action-links {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-bottom: 1.25rem;
    }

    .btn-action {
      display: block;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-poster {
      background: #027f7e;
      color: white;
    }

    .btn-poster:hover {
      background: #015f5e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(2, 127, 126, 0.3);
    }

    .btn-more {
      background: white;
      color: #027f7e;
      border: 2px solid #027f7e;
    }

    .btn-more:hover {
      background: #f0faf9;
      transform: translateY(-2px);
    }

    .reset-countdown-text {
      font-size: 0.76rem;
      color: #BDBDBD;
    }

    /* ── Shout-out opt-in ────────────────────────────────────────────── */
    #shoutout-opt-in-group {
      background: #F1F8E9;
      border-left: 3px solid #7CB342;
      border-radius: 0 6px 6px 0;
      padding: 0.5rem 0.75rem 0.5rem 1rem;
      margin-top: -0.25rem;
    }

    #shoutout-opt-in-group label { font-size: 0.86rem; color: #558B2F; }

    @media (max-width: 600px) {
      .pathway-grid { grid-template-columns: repeat(3, 1fr); }
      .form-row     { flex-direction: column; }
      .form-actions { flex-direction: column; }
      .btn-back     { margin-right: 0; margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="form-section">
      <form id="pledge-form">

        <!-- ── Step 1: Start ─────────────────────────────────────────── -->
        <div class="form-step active" data-step="1">
          <div class="start-screen">
            <button type="button" class="pledge-start-btn" onclick="nextStep()">
              MAKE YOUR VEG PLEDGE!
            </button>
          </div>
        </div>

        <!-- ── Step 2: Choose User Type ──────────────────────────────── -->
        <div class="form-step" data-step="2">
          <h2>I'm pledging as a...</h2>

          <div class="pathway-grid">
            <button type="button" class="pathway-card" data-type="individual" onclick="selectPathway(event, 'individual')">
              <div class="emoji">🧑</div>
              <div class="label">Individual</div>
            </button>
            <button type="button" class="pathway-card" data-type="family" onclick="selectPathway(event, 'family')">
              <div class="emoji">👨‍👩‍👧‍👦</div>
              <div class="label">Family</div>
            </button>
            <button type="button" class="pathway-card" data-type="school" onclick="selectPathway(event, 'school')">
              <div class="emoji">🏫</div>
              <div class="label">School</div>
            </button>
            <button type="button" class="pathway-card" data-type="organisation" onclick="selectPathway(event, 'organisation')">
              <div class="emoji">🏢</div>
              <div class="label">Organisation</div>
            </button>
            <button type="button" class="pathway-card" data-type="community" onclick="selectPathway(event, 'community')">
              <div class="emoji">🤝</div>
              <div class="label">Community</div>
            </button>
            <button type="button" class="pathway-card" data-type="other" onclick="selectPathway(event, 'other')">
              <div class="emoji">✨</div>
              <div class="label">Other</div>
            </button>
          </div>

          <button type="button" class="btn btn-back" onclick="prevStep()">← Back</button>
        </div>

        <!-- ── Step 3: Form Fields ────────────────────────────────────── -->
        <div class="form-step" data-step="3">
          <h2>Your Details</h2>

          <!-- Name + Email always side-by-side -->
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name *</label>
              <input type="text" id="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" required>
              <small>We'll only use this to track your submission</small>
            </div>
          </div>

          <div class="form-group">
            <label for="pledge">Choose your Pledge *</label>
            <select id="pledge" required>
              <option value="">Select a pledge...</option>
            </select>
          </div>

          <div id="pathway-fields">
            <!-- Dynamically populated pathway-specific fields -->
          </div>

          <div class="form-group checkbox">
            <label>
              <input type="checkbox" id="newsletter">
              Send me updates
            </label>
          </div>

          <!-- Shout-out opt-in: only shown for school / organisation / community -->
          <div class="form-group checkbox" id="shoutout-opt-in-group" style="display:none;">
            <label>
              <input type="checkbox" id="shoutout">
              📣 I'm happy to appear in the 'Shout Out' box to help promote the campaign
            </label>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-back" onclick="prevStep()">← Back</button>
            <button type="submit" class="btn btn-primary">Submit Pledge</button>
          </div>
        </div>

        <!-- ── Step 4: Pledge Submitted (End Card) ────────────────────── -->
        <div class="form-step" data-step="4">
          <div class="end-card">

            <h2>Pledge Submitted</h2>
            <p class="end-card-subtitle">Thank you for joining the Just One More campaign!</p>

            <p class="share-label">Share your pledge</p>
            <div class="share-buttons">

              <!-- Facebook – copies message to clipboard, opens sharer; user pastes text -->
              <button type="button" class="share-btn share-facebook" onclick="shareToFacebook()">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                  <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Facebook
              </button>

              <!-- Instagram – copies message to clipboard, opens Instagram; user pastes text -->
              <button type="button" class="share-btn share-instagram" onclick="shareToInstagram()">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                  <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                </svg>
                Instagram
              </button>

              <!-- LinkedIn – copies message to clipboard, opens share dialog; user pastes text -->
              <button type="button" class="share-btn share-linkedin" onclick="shareToLinkedIn()">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                  <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                LinkedIn
              </button>

              <!-- Bluesky -->
              <a class="share-btn share-bluesky"
                 href="https://bsky.app/intent/compose?text=Join+the+Just+One+More+Campaign+and+make+your+Veg+Pledge+today!+foodwiseleeds.org%2Fproject%2Fjust-one-more+%23justonemore"
                 target="_blank" rel="noopener">
                <svg viewBox="0 0 568 501" width="15" height="15" fill="currentColor" aria-hidden="true">
                  <path d="M123.121 33.664C188.241 82.553 258.281 181.68 284 234.873c25.719-53.192 95.759-152.32 160.879-201.209C491.866-1.611 568-28.906 568 57.947c0 17.346-9.945 145.713-15.778 166.555-20.275 72.453-94.155 90.933-159.875 79.748C507.222 323.8 536.444 388.56 473.333 453.32c-119.86 122.992-172.272-30.859-185.702-70.281-2.462-7.227-3.614-10.608-3.631-7.733-.017-2.875-1.169.506-3.631 7.733-13.43 39.422-65.842 193.273-185.702 70.281-63.111-64.76-33.889-129.52 80.654-149.07-65.72 11.185-139.6-7.295-159.875-79.748C9.945 203.66 0 75.293 0 57.947 0-28.906 76.134-1.611 123.121 33.664z"/>
                </svg>
                Bluesky
              </a>

              <!-- X / Twitter -->
              <a class="share-btn share-twitter"
                 href="https://twitter.com/intent/tweet?text=Join+the+Just+One+More+Campaign+and+make+your+Veg+Pledge+today!+foodwiseleeds.org%2Fproject%2Fjust-one-more+%23justonemore"
                 target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.633 5.905-5.633zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                X / Twitter
              </a>

            </div>
            <div id="share-toast" class="share-toast"></div>

            <hr class="end-card-divider">

            <div class="action-links">
              <!-- Update href to the poster pack download URL when ready -->
              <a class="btn-action btn-poster" href="#" target="_blank">Download your Poster Pack</a>
              <a class="btn-action btn-more" href="https://foodwiseleeds.org/project/just-one-more" target="_blank">Find Out More</a>
            </div>

            <p class="reset-countdown-text">Resetting in <span id="reset-countdown">15</span>s&hellip;</p>

          </div>
        </div>

      </form>
    </div>
  </div>

  <script src="form-widget-app.js"></script>
  <script type="module" src="./widget-config.js"></script>
  <script type="module" src="./form-widget-submit.js"></script>
  <script nomodule>
    console.warn('ES modules not supported - using fallback mode');
    window.JOM = { submitPledgeWithFirestore: null };
  </script>
</body>
</html>
